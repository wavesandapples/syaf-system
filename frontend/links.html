<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Links</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      margin: 20px;
      background: linear-gradient(to right, pink, lightblue);
      color: #333;
    }
    /* Header */
    header {
      background: #ff69b4; /* pink */
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo img {
      height: 80px;
      width: auto;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 15px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 5px;
      transition: background 0.3s;
    }
    nav ul li a:hover {
      background: #ffccff;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #ff69b4;
      margin: 20px 0;
    }
    .links-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    .links-container a {
      text-align: center;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
    .links-container img {
      width: 150px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }
    .links-container img:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <a href="home.html" class="logo"><img src="images/logo3.png" alt="Syaf's logo"></a>
    <nav>
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="biography.html">Biography</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="timetable.html">Time Table</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="download.html">Download</a></li>
        <li><a href="links.html">Links</a></li>
        <li><a href="login.html">Admin Login</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <h1>Useful Links</h1>

  <div class="links-container">
    <!-- UiTM Website -->
    <a href="https://uitm.edu.my" target="_blank">
      <img src="images/uitm.png" alt="UiTM Website">
      <p>UiTM Website</p>
    </a>

    <!-- FSKM Website -->
    <a href="https://fskm.uitm.edu.my" target="_blank">
      <img src="images/fskm.png" alt="FSKM Website">
      <p>FSKM Website</p>
    </a>

    <!-- i-Student Portal -->
    <a href="https://istudent.uitm.edu.my" target="_blank">
      <img src="images/istudent.png" alt="i-Student Portal">
      <p>i-Student Portal</p>
    </a>
  </div>
</body>
</html>
