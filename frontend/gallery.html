<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galleries</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      margin: 20px;
      background: linear-gradient(to right, pink, lightblue);
      color: #333;
    }
    /* Header */
    header {
      background: #ff69b4; /* pink */
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo img {
      height: 80px;
      width: auto;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 15px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 5px;
      transition: background 0.3s;
    }
    nav ul li a:hover {
      background: #ffccff;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #ff69b4;
      margin: 20px 0;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 20px;
    }
    .gallery img, .gallery video {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      cursor: pointer;
    }
    /* Lightbox overlay */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .lightbox-content {
      max-width: 90%;
      max-height: 90%;
    }
    .lightbox-content img, .lightbox-content video {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <a href="home.html" class="logo"><img src="images/logo3.png" alt="Syaf's logo"></a>
    <nav>
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="biography.html">Biography</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="timetable.html">Time Table</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="download.html">Download</a></li>
        <li><a href="links.html">Links</a></li>
        <li><a href="login.html">Admin Login</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <h1>My Galleries</h1>

  <!-- Gallery Section -->
  <div class="gallery">
    <!-- Pictures -->
    <img src="images/gallery/pic1.jpg" alt="Picture 1">
    <img src="images/gallery/pic2.jpg" alt="Picture 2">
    <img src="images/gallery/pic3.jpg" alt="Picture 3">
    <img src="images/gallery/pic4.jpg" alt="Picture 4">
    <img src="images/gallery/pic5.jpg" alt="Picture 5">
    <img src="images/gallery/pic6.jpg" alt="Picture 6">
    <img src="images/gallery/pic7.jpg" alt="Picture 7">
    <img src="images/gallery/pic8.jpg" alt="Picture 7">
    <img src="images/gallery/pic9.jpg" alt="Picture 9">
    <img src="images/gallery/pic10.jpg" alt="Picture 10">
    <img src="images/gallery/pic11.jpg" alt="Picture 11">
    <img src="images/gallery/pic12.jpg" alt="Picture 12">
    <img src="images/gallery/pic13.jpg" alt="Picture 13">

    <!-- Horizontal Video -->
    <video controls>
      <source src="images/gallery/v2.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <!-- Vertical Video -->
    <video controls style="aspect-ratio: 9/16;">
      <source src="images/gallery/v3.mp4" type="video/mp4">

      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close-btn" onclick="closeLightbox()">&times;</span>
    <div class="lightbox-content" id="lightbox-content"></div>
  </div>

  <script>
    const galleryItems = document.querySelectorAll('.gallery img, .gallery video');
    const lightbox = document.getElementById('lightbox');
    const lightboxContent = document.getElementById('lightbox-content');

    galleryItems.forEach(item => {
      item.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        if (item.tagName === 'IMG') {
          lightboxContent.innerHTML = `<img src="${item.src}" alt="${item.alt}">`;
        } else if (item.tagName === 'VIDEO') {
          lightboxContent.innerHTML = `<video controls autoplay><source src="${item.querySelector('source').src}" type="video/mp4"></video>`;
        }
      });
    });

    function closeLightbox() {
      lightbox.style.display = 'none';
      lightboxContent.innerHTML = '';
    }
  </script>
</body>
</html>
